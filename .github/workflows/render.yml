name: Motor Mektebi Manim Video Render

on:
  repository_dispatch:
    types: [manim_render_event]

jobs:
  render_video:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Bilgisayara Çek
      uses: actions/checkout@v4
      with:
        ref: main # En güncel PUT edilen ses dosyasını alabilmesi için ana dalı çeker

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Sistem Bağımlılıklarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libpango1.0-dev libcairo2-dev pkg-config freeglut3-dev

    - name: Python Kütüphanelerini Kur
      run: |
        python -m pip install --upgrade pip
        pip install manim requests

    - name: Manim Kodunu Hazırla
      run: |
        # Gemini'dan gelen dikey formatlı kodu doğrudan dosyaya yazar
        cat << 'EOF' > scene.py
        ${{ github.event.client_payload.manim_code }}
        EOF

    - name: Videoyu Manim ile Çiz
      run: |
        manim -ql scene.py -o raw_animation.mp4

    - name: Ses ve Videoyu FFmpeg ile Birleştir
      run: |
        # Manim'in ürettiği mp4 dosyasını klasör ve sınıf ismi ne olursa olsun otomatik buluruz
        RAW_VIDEO=$(find media -name "*.mp4" | head -n 1)
        echo "Bulunan ham video yolu: $RAW_VIDEO"
        
        if [ -z "$RAW_VIDEO" ]; then
          echo "Hata: Manim tarafından üretilen video dosyası bulunamadı!"
          exit 1
        fi
        
        ffmpeg -i "$RAW_VIDEO" -i background_audio.mp3 -c:v copy -c:a aac -map 0:v:0 -map 1:a:0 output_video.mp4

    - name: Bitmiş Videoyu GitHub'a Kaydet (Geçici)
      uses: actions/upload-artifact@v4
      with:
        name: motor-mektebi-video-${{ github.run_number }}
        path: output_video.mp4
